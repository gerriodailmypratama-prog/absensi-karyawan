<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Absensi Karyawan</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container login-page">
  <div class="card">
    <div class="logo">
      <h1>Absensi Karyawan</h1>
      <p class="muted">Silakan login untuk melanjutkan</p>
    </div>
    <div id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="nama@perusahaan.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" placeholder="********" autocomplete="current-password">
      <button id="btnLoginEmail" class="btn btn-primary">Login</button>
      <button id="btnForgotPwd" type="button" style="background:none;border:none;color:#f97316;text-decoration:underline;font-size:13px;margin-top:6px;cursor:pointer;padding:4px;">Lupa Password?</button>
      <div class="divider"><span>atau</span></div>
      <button id="btnLoginGoogle" class="btn btn-google">Login dengan Google</button>
      <p id="loginMsg" class="msg"></p>
      <p class="footer" style="margin-top:14px">Belum punya akun? <a href="#" id="linkShowRegister" style="color:#f97316;text-decoration:underline">Daftar di sini</a></p>
    </div>
    <div id="registerForm" class="hidden">
      <label>Nama Lengkap</label>
      <input type="text" id="regNama" placeholder="Nama sesuai KTP" autocomplete="name">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="nama@email.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="minimal 6 karakter" autocomplete="new-password">
      <label>Kode Pendaftaran</label>
      <input type="text" id="regCode" placeholder="Minta kode ke admin/owner">
      <button id="btnRegister" class="btn btn-primary">Daftar</button>
      <p id="registerMsg" class="msg"></p>
      <p class="footer" style="margin-top:14px">Sudah punya akun? <a href="#" id="linkShowLogin" style="color:#f97316;text-decoration:underline">Login di sini</a></p>
    </div>
  </div>
  <p class="footer">&copy; 2026 Absensi Karyawan Goodgems</p>
</div>
<script type="module" src="js/auth.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js',{updateViaCache:'none'}).catch(console.error));
}
</script>
</body>
</html>
